<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart | Samsung Covers</title>
    <link rel="stylesheet" href="samsung.css" />
  </head>
  <body data-page="cart">
    <header class="header">
      <a class="brand" href="samsung.html">Samsung Covers</a>
      <nav class="nav">
        <a href="samsung.html">Home</a>
        <a href="profile.html">Profile</a>
        <a href="shop.html">Shop</a>
        <a href="cart.html">Cart <span id="cartBadge">0</span></a>
      </nav>
    </header>

    <main class="shell">
      <section class="page-card">
        <div class="section-heading">
          <p class="eyebrow">Cart</p>
          <h1>Your selected covers</h1>
          <p>Review what you added, remove what you do not want, and confirm your order.</p>
        </div>

        <div id="cartItems" class="cart-items"></div>
        <div class="cart-summary">
          <h3 id="cartTotal">Total: ₹0</h3>
          <button id="checkoutBtn" class="btn primary">Proceed to Buy</button>
          <p id="checkoutMessage" class="form-message" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <footer>
      <p>© <span id="year"></span> Samsung Covers. All rights reserved.</p>
    </footer>

    <script src="samsung.js"></script>
  </body>
</html>
