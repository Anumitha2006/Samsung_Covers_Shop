<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | Samsung Covers</title>
    <link rel="stylesheet" href="samsung.css" />
  </head>
  <body data-page="profile">
    <header class="header">
      <a class="brand" href="samsung.html">Samsung Covers</a>
      <nav class="nav">
        <a href="samsung.html">Home</a>
        <a href="profile.html">Profile</a>
        <a href="shop.html">Shop</a>
        <a href="cart.html">Cart <span id="cartBadge">0</span></a>
      </nav>
    </header>

    <main class="shell">
      <section class="page-card">
        <div class="section-heading">
          <p class="eyebrow">Profile</p>
          <h1>Update your profile anytime</h1>
          <p>Save your name, contact number and delivery address so checkout is quicker later.</p>
        </div>
        <form id="profileForm" class="stack-form">
          <input type="text" id="customerName" placeholder="Full name" required />
          <input type="email" id="customerEmail" placeholder="Email address" required />
          <input type="tel" id="customerPhone" placeholder="Phone number" required />
          <textarea id="customerAddress" rows="4" placeholder="Delivery address" required></textarea>
          <button class="btn primary" type="submit">Save Profile</button>
          <p id="profileMessage" class="form-message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <footer>
      <p>© <span id="year"></span> Samsung Covers. All rights reserved.</p>
    </footer>

    <script src="samsung.js"></script>
  </body>
</html>
